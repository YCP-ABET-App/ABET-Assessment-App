name: Run Unit Tests

on: push

jobs:
  build-code:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Clean Gradle Cache
        run: ./gradlew clean

      - name: Assemble with Gradle
        run: ./gradlew assemble

  run-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Run unit tests
        run: ./gradlew test
