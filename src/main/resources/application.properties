# Development profile for running Spring Boot directly (./gradlew bootRun)
spring.application.name=ABET-Assessment-App
server.port=8080

# MariaDB Database
spring.datasource.url=jdbc:mariadb://localhost:3307/abet_assessment_local
spring.datasource.username=username
spring.datasource.password=password
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver

# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Connection pool settings (optional but recommended)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
