databaseChangeLog:
  - changeSet:
      id: add-threshold-to-course
      author: ohornbeck
      preConditions:
        - onFail: MARK_RAN
          not:
            columnExists:
              tableName: course
              columnName: threshold
      changes:
        - addColumn:
            tableName: course
            columns:
              - column:
                  name: threshold
                  type: DECIMAL(5,2)
                  constraints:
                    nullable: false
