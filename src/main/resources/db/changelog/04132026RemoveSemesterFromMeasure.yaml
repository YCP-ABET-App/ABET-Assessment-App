databaseChangeLog:
  - changeSet:
      id: drop-semester-from-measure
      author: ohornbeck
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            columnName: semester_id
            tableName: measure
      changes:
        - dropForeignKeyConstraint:
            baseTableName: measure
            constraintName: measure_ibfk_2

        - dropColumn:
            tableName: measure
            columnName: semester_id