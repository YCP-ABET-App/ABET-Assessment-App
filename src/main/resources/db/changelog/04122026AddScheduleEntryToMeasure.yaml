databaseChangeLog:
  - changeSet:
      id: add-schedule-entry-to-measure
      author: ohornbeck
      preConditions:
        - onFail: MARK_RAN
          tableExists:
            tableName: measure
      changes:
        - addColumn:
            tableName: measure
            columns:
              - column:
                  name: schedule_entry_id
                  type: BIGINT
                  constraints:
                    nullable: false
