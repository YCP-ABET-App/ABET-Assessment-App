databaseChangeLog:
  - changeSet:
      id: 1
      author: ohornbeck
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: measure_results
      changes:
        - createTable:
            tableName: measure_results
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: observation
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: rejection_note
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column: 
                  name: status
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: met
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: exceeds
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: below
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: measure_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: section_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: program_id
                  type: BIGINT
                  constraints:
                    nullable: false
