# Use this as an example for adding new tables to database,
# follow changelog conventions, preconditions, field constraints, etc.
databaseChangeLog:
  - changeSet:
      id: 1
      author: elarson
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: section
      changes:
        - createTable:
            tableName: section
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: section_number
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: semester_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: instructor_id
                  type: BIGINT
                  constraints:
                    nullable: false
