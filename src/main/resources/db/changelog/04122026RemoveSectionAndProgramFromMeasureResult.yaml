databaseChangeLog:
  - changeSet:
      id: drop-section-column-from-measure-result
      author: ohornbeck
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            columnName: section_id
            tableName: measure_result
      changes:
        - dropColumn:
            columnName: section_id
            tableName: measure_result
  - changeSet:
      id: drop-program-column-from-measure-result
      author: ohornbeck
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            columnName: program_id
            tableName: measure_result
      changes:
        - dropColumn:
            columnName: program_id
            tableName: measure_result