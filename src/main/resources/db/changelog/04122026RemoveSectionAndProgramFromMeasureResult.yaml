databaseChangeLog:
  - changeSet:
      id: drop-section-from-measure-result
      author: ohornbeck
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            columnName: section_id
            tableName: measure_result
      changes:
        - dropForeignKeyConstraint:
            baseTableName: measure_result
            constraintName: measure_result_ibfk_2

        - dropColumn:
            tableName: measure_result
            columnName: section_id