databaseChangeLog:
  - changeSet:
      id: add-recommended-actions-table
      author: ohornbeck
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: recommended_action
      changes:
        - createTable:
            tableName: recommended_action
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: recommendation
                  type: VARCHAR
                  constraints:
                    nullable: false
              - column:
                  name: program_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: measure_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false