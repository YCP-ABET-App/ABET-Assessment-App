databaseChangeLog:
  - changeSet:
      id: add-section-program-to-measure-result
      author: ohornbeck
      preConditions:
        - onFail: MARK_RAN
          tableExists:
            tableName: measure_result
      changes:
        - addColumn:
            tableName: measure_result
            columns:
              - column:
                  name: section_program_id
                  type: BIGINT
                  constraints:
                    nullable: false