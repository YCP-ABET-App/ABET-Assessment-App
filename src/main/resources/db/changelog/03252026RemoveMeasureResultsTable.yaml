databaseChangeLog:
  - changeSet:
      id: 03252026-remove-measure-results-table
      author: ohornbeck
      changes:
        - dropTable:
            tableName: measure_results
            cascadeConstraints: true
      rollback:
        - createTable:
            tableName: measure_results
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: observation
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: rejection_note
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              - column:
                  name: met
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: exceeds
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: below
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: measure_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: section_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: program_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: deleted
                  type: BOOLEAN
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false