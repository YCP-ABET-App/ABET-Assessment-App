databaseChangeLog:

  - changeSet:
      id: remove-semester-fk
      author: ohornbeck
      preConditions:
      - onFail: MARK_RAN
        foreignKeyConstraintExists:
          foreignKeyName: course_ibfk_1
      changes:
      - dropForeignKeyConstraint:
          baseTableName: course
          constraintName: course_ibfk_1

  - changeSet:
      id: drop-semester-column
      author: ohornbeck
      preConditions:
        - onFail: MARK_RAN
          columnExists:
            tableName: course
            columnName: semester_id
      changes:
        - dropColumn:
            tableName: course
            columnName: semester_id
