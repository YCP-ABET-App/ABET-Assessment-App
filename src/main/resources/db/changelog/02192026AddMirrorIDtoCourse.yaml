databaseChangeLog:
  - changeSet:
      id: add-mirror-id-to-course
      author: ohornbeck
      changes:
        - addColumn:
            tableName: course
            columns:
              - column:
                  name: mirror_id
                  type: BIGINT
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            baseTableName: course
            baseColumnNames: mirror_id
            referencedTableName: course
            referencedColumnNames: id
            constraintName: fk_course_mirror