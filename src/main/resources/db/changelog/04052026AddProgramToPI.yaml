databaseChangeLog:
  - changeSet:
      id: add-program-to-performance-indicator
      author: ohornbeck
      preConditions:
        - onFail: MARK_RAN
          tableExists:
            tableName: performance_indicator
      changes:
        - addColumn:
            tableName: performance_indicator
            columns:
              - column:
                  name: program_id
                  type: BIGINT
                  constraints:
                    nullable: false