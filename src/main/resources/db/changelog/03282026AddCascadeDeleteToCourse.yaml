databaseChangeLog:
  - changeSet:
      id: add-cascade-delete-to-course
      author: jonathan
      changes:
        - dropForeignKeyConstraint:
            baseTableName: course_indicator
            constraintName: course_indicator_ibfk_1
        - addForeignKeyConstraint:
            baseTableName: course_indicator
            baseColumnNames: course_id
            referencedTableName: course
            referencedColumnNames: id
            constraintName: course_indicator_ibfk_1
            onDelete: CASCADE

