#            constraintName: measure_ibfk_1
#            onDelete: CASCADE

        - dropForeignKeyConstraint:
            baseTableName: measure_result
            constraintName: measure_result_ibfk_1
        - addForeignKeyConstraint:
            baseTableName: measure_result
            baseColumnNames: measure_id
            referencedTableName: measure
            referencedColumnNames: id
            constraintName: measure_result_ibfk_1
            onDelete: CASCADE
