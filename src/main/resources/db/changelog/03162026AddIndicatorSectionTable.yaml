databaseChangeLog:
  - changeSet:
      id: add-indicator-section-table
      author: elarson
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: section_indicator
      changes:
        - createTable:
            tableName: section_indicator
            columns:
                - column:
                    name: id
                    type: BIGINT
                    constraints:
                      primaryKey: true
                      nullable: false
                - column:
                    name: section_id
                    type: BIGINT
                    constraints:
                        nullable: false
                - column:
                    name: indicator_id
                    type: BIGINT
                    constraints:
                        nullable: false
                - column:
                    name: completed
                    type: BOOLEAN
                    constraints:
                        nullable: false
                - column:
                    name: created_at
                    type: TIMESTAMP
                    constraints:
                      nullable: false
                - column:
                    name: updated_at
                    type: TIMESTAMP
                    constraints:
                      nullable: false
                - column:
                    name: version
                    type: BIGINT
                    constraints:
                      nullable: false
                - column:
                    name: deleted
                    type: BOOLEAN
                    constraints:
                      nullable: false
                - column:
                    name: deleted_at
                    type: TIMESTAMP
                    constraints:
                      nullable: false